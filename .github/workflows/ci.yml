name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check generated catalog index
        run: python3 ci/catalog_index.py --check

  vector:
    uses: komrad-company/workflows/.github/workflows/vector-checks.yml@main
    with:
      vector-image: timberio/vector:0.54.0-debian
    secrets: inherit

  publish:
    needs: [catalog, vector]
    if: github.ref == 'refs/heads/main'
    uses: komrad-company/workflows/.github/workflows/docker-publish.yml@main
    with:
      context: .
      image: ghcr.io/komrad-company/kolektor
    secrets: inherit
