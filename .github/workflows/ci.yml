name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VECTOR_IMAGE: timberio/vector:0.54.0-debian
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  validate:
    runs-on: ubuntu-latest
    container:
      image: timberio/vector:0.54.0-debian
    steps:
      - uses: actions/checkout@v4
      - name: Validate Vector configs
        run: |
          chmod +x ci/validate.sh
          ci/validate.sh
      - name: Upload validate results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validate-results
          path: ci/results/

  test:
    runs-on: ubuntu-latest
    container:
      image: timberio/vector:0.54.0-debian
    steps:
      - uses: actions/checkout@v4
      - name: Run Vector tests
        run: |
          chmod +x ci/test.sh
          ci/test.sh
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ci/results/

  coverage:
    runs-on: ubuntu-latest
    container:
      image: timberio/vector:0.54.0-debian
    steps:
      - uses: actions/checkout@v4
      - name: Check coverage
        run: |
          chmod +x ci/coverage.sh
          ci/coverage.sh

  report:
    runs-on: ubuntu-latest
    needs: [validate, test]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Download validate results
        uses: actions/download-artifact@v4
        with:
          name: validate-results
          path: ci/results/
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: ci/results/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate report
        run: python ci/report.py
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: ci-report
          path: ci/results/report.md

  build:
    runs-on: ubuntu-latest
    needs: [validate, test, coverage]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
