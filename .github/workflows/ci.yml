name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VECTOR_IMAGE: timberio/vector:0.54.0-debian
  RUST_VERSION: "1.94"
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/komrad-company/kolektor

jobs:
  # ── Vector catalog CI ─────────────────────────────────────────────────────────

  validate:
    runs-on: ubuntu-latest
    container:
      image: timberio/vector:0.54.0-debian
    steps:
      - uses: actions/checkout@v4
      - name: Validate Vector configs
        run: |
          chmod +x ci/validate.sh
          ci/validate.sh
      - name: Upload validate results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validate-results
          path: ci/results/

  test:
    runs-on: ubuntu-latest
    container:
      image: timberio/vector:0.54.0-debian
    steps:
      - uses: actions/checkout@v4
      - name: Run Vector tests
        run: |
          chmod +x ci/test.sh
          ci/test.sh
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ci/results/

  coverage:
    runs-on: ubuntu-latest
    container:
      image: timberio/vector:0.54.0-debian
    steps:
      - uses: actions/checkout@v4
      - name: Check coverage
        run: |
          chmod +x ci/coverage.sh
          ci/coverage.sh

  report:
    runs-on: ubuntu-latest
    needs: [validate, test]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Download validate results
        uses: actions/download-artifact@v4
        with:
          name: validate-results
          path: ci/results/
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: ci/results/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate report
        run: python ci/report.py
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: ci-report
          path: ci/results/report.md

  # ── Rust API CI ───────────────────────────────────────────────────────────────

  rust-checks:
    name: Rust Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy
          
      # Utilisation d'une action dédiée au cache Rust (plus robuste que actions/cache)
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: api -> target
          
      - name: Format Check
        run: cd api && cargo fmt --check
        
      - name: Clippy
        run: cd api && cargo clippy --workspace -- -D warnings
        
      - name: Run Tests
        run: cd api && cargo test --workspace
        
      - name: Test Release Build
        run: cd api && cargo build --release

  # ── Docker image & Security ───────────────────────────────────────────────────

  build:
    runs-on: ubuntu-latest
    needs: [validate, test, coverage, rust-checks]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      security-events: write # Requis pour uploader le SARIF report (Grype)
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          # Cache Docker layer (accélère le build)
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Scan de vulnérabilités avec Trivy ---
      # Repo privé en Free → pas de SARIF GHAS. Trivy affiche dans les logs et casse le build sur CRITICAL.
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true
