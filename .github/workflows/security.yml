name: Security — SAST

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  secrets:
    uses: komrad-company/workflows/.github/workflows/security-secrets.yml@main

  rust:
    uses: komrad-company/workflows/.github/workflows/security-rust.yml@main
    with:
      rust-version: "1.94"
      working-directory: api

  docker:
    uses: komrad-company/workflows/.github/workflows/security-docker.yml@main
    with:
      dockerfiles: "Dockerfile"

  codeql:
    uses: komrad-company/workflows/.github/workflows/codeql.yml@main
    permissions:
      contents: read
      security-events: write
      actions: read
    with:
      languages: '["rust"]'
      build-command: "cd api && cargo build --release"
