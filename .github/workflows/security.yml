name: Security — SAST

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

env:
  RUST_VERSION: "1.94"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  IMAGE_NAME: ghcr.io/komrad-company/kolektor

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (secrets)
    runs-on: komrad-runners
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz
          sudo mv gitleaks /usr/local/bin/
          gitleaks version
      - name: Run gitleaks (gate)
        run: gitleaks detect --source . --redact --verbose --report-format sarif --report-path gitleaks.sarif --exit-code 1
      - name: Run gitleaks (JSON — reporting)
        if: always()
        run: gitleaks detect --source . --redact --report-format json --report-path gitleaks.json --exit-code 0
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: gitleaks-report
          path: |
            gitleaks.sarif
            gitleaks.json
          retention-days: 30

  hadolint:
    name: hadolint (Dockerfile misconfig)
    runs-on: komrad-runners
    steps:
      - uses: actions/checkout@v5
      - uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error
          format: sarif
          output-file: hadolint.sarif
      - uses: hadolint/hadolint-action@v3.3.0
        if: always()
        with:
          dockerfile: Dockerfile
          failure-threshold: ignore
          format: json
          output-file: hadolint.json
          no-fail: true
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: hadolint-report
          path: |
            hadolint.sarif
            hadolint.json
          retention-days: 30

  grype-image:
    name: grype image
    runs-on: komrad-runners
    steps:
      - uses: actions/checkout@v5
      - name: Build image
        run: docker build -t "kolektor:scan" .
      - name: Grype scan (HIGH/CRITICAL — gating)
        uses: anchore/scan-action@v7.4.0
        with:
          image: kolektor:scan
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          output-format: table
          output-file: grype-image.txt
      - name: Grype scan (full JSON — reporting)
        if: always()
        uses: anchore/scan-action@v7.4.0
        with:
          image: kolektor:scan
          fail-build: false
          severity-cutoff: negligible
          output-format: json
          output-file: grype-image.json
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: grype-image-report
          path: |
            grype-image.txt
            grype-image.json
          retention-days: 30

  cargo-audit:
    name: cargo audit (RustSec)
    runs-on: komrad-runners
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cd api && cargo audit --json > ../cargo-audit.json
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: cargo-audit-report
          path: cargo-audit.json
          retention-days: 30

  cargo-deny:
    name: cargo deny (licences + bans + advisories)
    runs-on: komrad-runners
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo deny
        run: cd api && cargo deny check 2>&1 | tee ../cargo-deny.txt
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: cargo-deny-report
          path: cargo-deny.txt
          retention-days: 30
