[[tests]]
name = "FortiGate — traffic forward accept"

[[tests.inputs]]
insert_at = "parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = 'date=2024-04-14 time=10:23:45 devname="FG100F" devid="FG100FXXXXXXXXXX" logid="0000000013" type="traffic" subtype="forward" level="notice" vd="root" srcip=10.0.0.5 srcport=54321 srcintf="port1" dstip=8.8.8.8 dstport=443 dstintf="wan1" policyid=5 action=accept proto=6 service="HTTPS" duration=30 sentbyte=1234 rcvdbyte=5678 sentpkt=10 rcvdpkt=15'

[[tests.outputs]]
extract_from = "parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 4001)
  assert_eq!(.action, "Allow")
  assert_eq!(.action_id, 1)
  assert_eq!(.severity_id, 2)
  assert_eq!(.src_endpoint.ip, "10.0.0.5")
  assert_eq!(.src_endpoint.port, 54321)
  assert_eq!(.dst_endpoint.ip, "8.8.8.8")
  assert_eq!(.dst_endpoint.port, 443)
  assert_eq!(.connection_info.protocol_name, "HTTPS")
  assert_eq!(.traffic.bytes_in, 5678)
  assert_eq!(.traffic.bytes_out, 1234)
  assert_eq!(.unmapped.policyid, "5")
  assert_eq!(.unmapped.devname, "FG100F")
  assert_eq!(.metadata.product.vendor_name, "Fortinet")
'''
