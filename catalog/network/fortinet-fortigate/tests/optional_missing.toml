[[tests]]
name = "FortiGate — traffic accept missing optional fields (no service/duration/bytes)"

[[tests.inputs]]
insert_at = "fortigate_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = 'date=2024-04-14 time=10:25:10 devname="FG100F" devid="FG100FXXXXXXXXXX" logid="0000000013" type="traffic" subtype="local" level="information" vd="root" srcip=10.0.0.7 srcport=51000 dstip=10.0.0.1 dstport=53 action=accept proto=17'

[[tests.outputs]]
extract_from = "fortigate_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 4001)
  assert_eq!(.category_uid, 4)
  assert_eq!(.activity_id, 6)
  assert_eq!(.action, "Allow")
  assert_eq!(.action_id, 1)
  assert_eq!(.severity_id, 1)
  assert_eq!(.src_endpoint.ip, "10.0.0.7")
  assert_eq!(.dst_endpoint.port, 53)
  assert_eq!(.traffic.bytes_in, null)
  assert_eq!(.traffic.bytes_out, null)
  assert!(exists(.raw))
  assert!(exists(.uid))
'''
