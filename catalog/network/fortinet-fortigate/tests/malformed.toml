[[tests]]
name = "FortiGate — malformed (not key=value)"

[[tests.inputs]]
insert_at = "fortigate_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = "this is not a fortigate log at all, just random text"

# class_uid should be 0 (dropped by filter_valid)
[[tests.outputs]]
extract_from = "fortigate_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 0)
'''

[[tests.outputs]]
extract_from = "fortigate_raw_failed"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.parse_status, "failed")
  assert_eq!(.source_type, "network/fortinet-fortigate")
  assert_eq!(.parse_error, "fortigate_key_value_invalid")
  assert!(exists(.raw))
  assert!(exists(.uid))
'''
