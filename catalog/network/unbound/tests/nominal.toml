[[tests]]
name = "unbound — query A IPv4 (nominal)"

[[tests.inputs]]
insert_at = "unbound_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message   = "[1713091425] unbound[12345:0] info: 10.0.0.5 example.com. A IN"
  timestamp = "2024-04-14T10:23:45Z"
  hostname  = "opnsense.lan"
  appname   = "unbound"
  facility  = "local7"
  severity  = "6"
  procid    = "12345"

[[tests.outputs]]
extract_from = "unbound_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 4003)
  assert_eq!(.category_uid, 4)
  assert_eq!(.activity_id, 1)
  assert_eq!(.severity_id, 1)
  assert_eq!(.query.hostname, "example.com")
  assert_eq!(.query.type, "A")
  assert_eq!(.query.class, "IN")
  assert_eq!(.src_endpoint.ip, "10.0.0.5")
  assert_eq!(.metadata.product.name, "Unbound")
  assert!(exists(.raw))
  assert!(exists(.uid))
  assert!(exists(.time))
  assert!(exists(.tenant_id))
'''
