[[tests]]
name = "Suricata EVE — alert security finding"

[[tests.inputs]]
insert_at = "suricata_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = '{"timestamp":"2024-04-14T10:23:45.123456+0000","flow_id":123456789,"event_type":"alert","src_ip":"10.0.0.5","src_port":54321,"dest_ip":"8.8.8.8","dest_port":53,"proto":"UDP","app_proto":"dns","alert":{"action":"allowed","gid":1,"signature_id":2024218,"rev":4,"signature":"ET DNS Query for suspicious domain","category":"Potentially Bad Traffic","severity":2}}'

[[tests.outputs]]
extract_from = "suricata_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 2001)
  assert_eq!(.category_uid, 2)
  assert_eq!(.severity_id, 3)
  assert_eq!(.activity_id, 1)
  assert_eq!(.src_endpoint.ip, "10.0.0.5")
  assert_eq!(.dst_endpoint.ip, "8.8.8.8")
  assert_eq!(.dst_endpoint.port, 53)
  assert_eq!(.connection_info.protocol_name, "UDP")
  assert_eq!(.finding_info.title, "ET DNS Query for suspicious domain")
  assert_eq!(.finding_info.uid, "2024218")
  assert_eq!(.unmapped.alert_action, "allowed")
  assert!(exists(.raw))
  assert!(exists(.uid))
'''
