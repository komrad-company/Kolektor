[[tests]]
name = "Suricata EVE — flow event routes to ocsf-network (class 4001)"

[[tests.inputs]]
insert_at = "suricata_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = '{"timestamp":"2024-04-14T10:27:00.000000+0000","flow_id":222333444,"event_type":"flow","src_ip":"10.0.0.5","src_port":51222,"dest_ip":"93.184.216.34","dest_port":443,"proto":"TCP","app_proto":"tls","flow":{"pkts_toserver":12,"pkts_toclient":10,"bytes_toserver":1843,"bytes_toclient":4921,"start":"2024-04-14T10:26:55.000000+0000","end":"2024-04-14T10:27:00.000000+0000","age":5,"state":"closed","reason":"timeout","alerted":false}}'

[[tests.outputs]]
extract_from = "suricata_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 4001)
  assert_eq!(.category_uid, 4)
  assert_eq!(.activity_id, 6)
  assert_eq!(.severity_id, 1)
  assert_eq!(.src_endpoint.ip, "10.0.0.5")
  assert_eq!(.src_endpoint.port, 51222)
  assert_eq!(.dst_endpoint.ip, "93.184.216.34")
  assert_eq!(.dst_endpoint.port, 443)
  assert_eq!(.connection_info.protocol_name, "TCP")
  assert_eq!(.connection_info.app_protocol, "tls")
  assert_eq!(.traffic.bytes_out, 1843)
  assert_eq!(.traffic.bytes_in, 4921)
  assert_eq!(.traffic.packets_out, 12)
  assert_eq!(.traffic.packets_in, 10)
'''

# Confirm the 4001 event reaches the network route (ocsf-network sink), not http/dns/finding
[[tests.outputs]]
extract_from = "suricata_route_by_class.network"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 4001)
  assert_eq!(.activity_id, 6)
  assert_eq!(.unmapped.event_type, "flow")
'''
