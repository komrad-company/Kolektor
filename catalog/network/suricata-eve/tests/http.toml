[[tests]]
name = "Suricata EVE — http request"

[[tests.inputs]]
insert_at = "suricata_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = '{"timestamp":"2024-04-14T10:25:00.000000+0000","flow_id":111222333,"event_type":"http","src_ip":"10.0.0.5","src_port":51111,"dest_ip":"93.184.216.34","dest_port":80,"proto":"TCP","app_proto":"http","http":{"hostname":"example.com","url":"/index.html","http_user_agent":"curl/8.0","http_method":"GET","protocol":"HTTP/1.1","status":200,"length":1256}}'

[[tests.outputs]]
extract_from = "suricata_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 4002)
  assert_eq!(.category_uid, 4)
  assert_eq!(.http_request.http_method, "GET")
  assert_eq!(.http_request.url.hostname, "example.com")
  assert_eq!(.http_request.url.path, "/index.html")
  assert_eq!(.http_response.code, 200)
  assert_eq!(.src_endpoint.port, 51111)
  assert_eq!(.dst_endpoint.ip, "93.184.216.34")
  assert!(exists(.raw))
  assert!(exists(.uid))
'''
