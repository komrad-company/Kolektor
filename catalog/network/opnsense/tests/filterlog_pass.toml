[[tests]]
name = "OPNsense filterlog — pass TCP HTTPS"

[[tests.inputs]]
insert_at = "parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message   = "1,,,abc,igc0,match,pass,in,4,0x0,,64,1235,0,DF,6,tcp,52,10.0.0.1,8.8.8.8,12345,443,0"
  timestamp = "2024-04-14T10:23:46Z"
  hostname  = "fw1"
  appname   = "filterlog"

[[tests.outputs]]
extract_from = "parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 4001)
  assert_eq!(.category_uid, 4)
  assert_eq!(.action, "Allow")
  assert_eq!(.action_id, 1)
  assert_eq!(.severity_id, 1)
  assert_eq!(.src_endpoint.ip, "10.0.0.1")
  assert_eq!(.src_endpoint.port, 12345)
  assert_eq!(.dst_endpoint.ip, "8.8.8.8")
  assert_eq!(.dst_endpoint.port, 443)
  assert_eq!(.connection_info.protocol_name, "tcp")
  assert_eq!(.connection_info.direction, "in")
  assert_eq!(.unmapped.interface, "igc0")
'''
