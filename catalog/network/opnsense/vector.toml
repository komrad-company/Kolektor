# ==============================================================================
# OPNsense Firewall — filterlog
# OCSF Class : 4001 (Network Activity)
# Input      : Syslog TCP/UDP
# Tested with: OPNsense 24.x/25.x
# ==============================================================================

# --- SOURCE ---
[sources.input]
type    = "syslog"
address = "0.0.0.0:${LISTEN_PORT:-514}"
mode    = "tcp"

# --- TRANSFORM : parse + normalisation OCSF ---
[transforms.parse_and_normalize]
type   = "remap"
inputs = ["input"]
source = '''
  .tenant_id     = "${TENANT_ID}"
  .datasource_id = "${DATASOURCE_ID}"
  .received_time = to_unix_timestamp(now(), unit: "milliseconds")

  raw_msg = string!(.message)

  # filterlog CSV format (OPNsense) :
  # rulenr,subrulenr,anchorname,label,interface,reason,action,direction,ip_version,...
  # IPv4 (ip_version=4) :
  #   ...,tos,ecn,ttl,id,offset,flags,proto_id,proto,length,src,dst,[sport,dport for TCP/UDP]
  # Champs positions :
  # 0=rulenr, 1=subrulenr, 2=anchorname, 3=label, 4=interface, 5=reason, 6=action, 7=direction
  # 8=ip_version
  # IPv4: 9=tos, 10=ecn, 11=ttl, 12=id, 13=offset, 14=flags, 15=proto_id, 16=proto, 17=length
  #        18=src_ip, 19=dst_ip
  # TCP/UDP: 20=src_port, 21=dst_port

  fields = split(raw_msg, ",")
  field_count = length(fields)

  # Besoin d'au moins 20 champs pour un log filterlog valide
  valid = field_count >= 20

  if valid {
    action_raw = fields[6]
    direction = fields[7]
    ip_version = fields[8]
    proto = fields[16]
    src_ip = fields[18]
    dst_ip = fields[19]

    src_port_str = if field_count > 20 { fields[20] } else { "" }
    dst_port_str = if field_count > 21 { fields[21] } else { "" }
    src_port = if src_port_str != "" { to_int!(src_port_str) } else { null }
    dst_port = if dst_port_str != "" { to_int!(dst_port_str) } else { null }
    proto_num_raw = fields[15]
    proto_num = if proto_num_raw != null { to_int!(proto_num_raw) } else { null }
    interface = fields[4]

    ocsf_action = if action_raw == "pass" { "Allow" } else { "Deny" }
    ocsf_action_id = if action_raw == "pass" { 1 } else { 2 }
    ocsf_severity = if action_raw == "pass" { 1 } else { 2 }

    .class_uid    = 4001
    .category_uid = 4
    .severity_id  = ocsf_severity
    .time         = to_unix_timestamp(.timestamp, unit: "milliseconds") ?? to_unix_timestamp(now(), unit: "milliseconds")
    .action       = ocsf_action
    .action_id    = ocsf_action_id

    .src_endpoint = {
      "ip":   src_ip,
      "port": src_port
    }
    .dst_endpoint = {
      "ip":   dst_ip,
      "port": dst_port
    }
    .connection_info = {
      "protocol_num": proto_num,
      "protocol_name": proto,
      "direction":     direction
    }

    .metadata = {
      "product": {
        "name":        "OPNsense",
        "vendor_name": "OPNsense Project"
      },
      "version": "1.0.0"
    }

    rule_nr = fields[0]

    .unmapped = {
      "interface":  interface,
      "rule_nr":    rule_nr,
      "ip_version": ip_version
    }
  } else {
    .class_uid    = 0
    .category_uid = 0
    .severity_id  = 0
    .time         = to_unix_timestamp!(now(), unit: "milliseconds")
  }

  # Ligne brute complète (header syslog + CSV filterlog) + identifiant unique
  _ts   = to_string(.timestamp) ?? ""
  _host = string(.hostname)     ?? ""
  _app  = string(.appname)      ?? ""
  .raw  = _ts + " " + _host + " " + _app + ": " + raw_msg
  .uid  = uuid_v4()

  del(.message)
  del(.timestamp)
  del(.hostname)
  del(.appname)
  del(.facility)
  del(.severity)
  del(.procid)
  del(.msgid)
  del(.version)
  del(.source_type)
'''

# --- FILTER : drop malformed ---
[transforms.filter_valid]
type      = "filter"
inputs    = ["parse_and_normalize"]
condition = '.class_uid == 4001'

# --- TRANSFORM : extraction pour raw-logs ---
[transforms.raw_only]
type   = "remap"
inputs = ["filter_valid"]
source = '''
  . = {
    "uid":           .uid,
    "time":          .time,
    "received_time": .received_time,
    "tenant_id":     .tenant_id,
    "datasource_id": .datasource_id,
    "raw":           .raw
  }
'''

# --- SINK : Quickwit OCSF ---
[sinks.quickwit]
type                = "http"
inputs              = ["filter_valid"]
uri                 = "${QUICKWIT_ENDPOINT}/api/v1/ocsf-network/ingest"
encoding.codec      = "json"
framing.method      = "newline_delimited"
batch.max_events    = 1000
batch.timeout_secs  = 5

[sinks.quickwit.request]
headers.Content-Type = "application/x-ndjson"

# --- SINK : Quickwit raw-logs ---
[sinks.quickwit_raw]
type                = "http"
inputs              = ["raw_only"]
uri                 = "${QUICKWIT_ENDPOINT}/api/v1/raw-logs/ingest"
encoding.codec      = "json"
framing.method      = "newline_delimited"
batch.max_events    = 1000
batch.timeout_secs  = 5

[sinks.quickwit_raw.request]
headers.Content-Type = "application/x-ndjson"
