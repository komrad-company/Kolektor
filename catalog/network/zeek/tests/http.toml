[[tests]]
name = "Zeek — http.log GET routes to ocsf-http (class 4002, activity Get)"

[[tests.inputs]]
insert_at = "zeek_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = '{"_path":"http","ts":1713091425.7,"id.orig_h":"10.0.0.5","id.resp_h":"1.2.3.4","method":"GET","host":"example.com","uri":"/","status_code":200,"user_agent":"curl/8"}'

[[tests.outputs]]
extract_from = "zeek_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 4002)
  assert_eq!(.category_uid, 4)
  assert_eq!(.severity_id, 1)
  assert_eq!(.activity_id, 3)
  assert_eq!(.time, 1713091425700)
  assert_eq!(.src_endpoint.ip, "10.0.0.5")
  assert_eq!(.dst_endpoint.ip, "1.2.3.4")
  assert_eq!(.http_request.http_method, "GET")
  assert_eq!(.http_request.url.hostname, "example.com")
  assert_eq!(.http_request.url.path, "/")
  assert_eq!(.http_request.user_agent, "curl/8")
  assert_eq!(.http_response.code, 200)
  assert!(exists(.uid))
'''

# Confirm the 4002 event reaches the http route.
[[tests.outputs]]
extract_from = "zeek_route_by_class.http"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 4002)
  assert_eq!(.activity_id, 3)
'''

[[tests]]
name = "Zeek — http.log POST maps to activity Post (6)"

[[tests.inputs]]
insert_at = "zeek_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = '{"_path":"http","ts":1713091425.8,"id.orig_h":"10.0.0.5","id.resp_h":"1.2.3.4","method":"POST","host":"example.com","uri":"/login","status_code":302,"user_agent":"Mozilla/5.0"}'

[[tests.outputs]]
extract_from = "zeek_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 4002)
  assert_eq!(.activity_id, 6)
  assert_eq!(.http_response.code, 302)
'''
