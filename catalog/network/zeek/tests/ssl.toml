[[tests]]
name = "Zeek — ssl.log routes to ocsf-network (class 4001, activity Traffic)"

[[tests.inputs]]
insert_at = "zeek_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = '{"_path":"ssl","ts":1713091425.9,"id.orig_h":"10.0.0.5","id.resp_h":"1.2.3.4","server_name":"example.com","version":"TLSv13","validation_status":"ok"}'

[[tests.outputs]]
extract_from = "zeek_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 4001)
  assert_eq!(.category_uid, 4)
  assert_eq!(.severity_id, 1)
  assert_eq!(.activity_id, 6)
  assert_eq!(.time, 1713091425900)
  assert_eq!(.src_endpoint.ip, "10.0.0.5")
  assert_eq!(.dst_endpoint.ip, "1.2.3.4")
  assert_eq!(.tls.sni, "example.com")
  assert_eq!(.tls.version, "TLSv13")
  assert_eq!(.tls.validation_status, "ok")
  assert!(exists(.uid))
'''

# ssl has no dedicated TLS index — it reaches the network route (4001).
[[tests.outputs]]
extract_from = "zeek_route_by_class.network"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 4001)
  assert_eq!(.activity_id, 6)
  assert_eq!(.unmapped.zeek_path, "ssl")
'''
