[[tests]]
name = "Zeek — conn.log without ports / bytes still classifies as 4001"

[[tests.inputs]]
insert_at = "zeek_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = '{"_path":"conn","ts":1713091425.123,"id.orig_h":"10.0.0.5","id.resp_h":"1.2.3.4","proto":"udp","conn_state":"OTH"}'

[[tests.outputs]]
extract_from = "zeek_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 4001)
  assert_eq!(.category_uid, 4)
  assert_eq!(.severity_id, 1)
  # conn_state not S0/REJ/SF -> Traffic (6)
  assert_eq!(.activity_id, 6)
  assert_eq!(.src_endpoint.ip, "10.0.0.5")
  # Missing optional fields collapse to null, never error.
  assert_eq!(.src_endpoint.port, null)
  assert_eq!(.dst_endpoint.port, null)
  assert_eq!(.traffic.bytes_out, null)
  assert_eq!(.traffic.bytes_in, null)
  assert_eq!(.duration, null)
  assert_eq!(.connection_info.protocol_name, "udp")
  assert!(exists(.raw))
  assert!(exists(.uid))
'''
