[[tests]]
name = "Microsoft 365 Audit — required fields missing"

[[tests.inputs]]
insert_at = "microsoft365_audit_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  Id           = "m365-bad"
  CreationTime = "2026-04-22T10:00:00"

[[tests.outputs]]
extract_from = "microsoft365_audit_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 0)
  assert_eq!(.category_uid, 0)
  assert!(exists(.raw))
'''

[[tests.outputs]]
extract_from = "microsoft365_audit_raw_failed"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.parse_status, "failed")
  assert_eq!(.source_type, "cloud/microsoft-365-audit")
  assert_eq!(.parse_error, "microsoft365_audit_required_fields_missing")
  assert!(exists(.raw))
'''
