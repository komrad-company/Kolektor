[[tests]]
name = "CloudTrail — empty eventName (invalid)"

[[tests.inputs]]
insert_at = "cloudtrail_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  eventVersion = "1.08"
  eventTime    = "2024-04-14T12:00:00Z"

[[tests.outputs]]
extract_from = "cloudtrail_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 0)
'''

[[tests.outputs]]
extract_from = "cloudtrail_raw_failed"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.parse_status, "failed")
  assert_eq!(.source_type, "cloud/aws-cloudtrail")
  assert_eq!(.parse_error, "cloudtrail_event_name_missing")
  assert!(exists(.raw))
  assert!(exists(.uid))
'''
