[[tests]]
name = "k8s-audit — delete forbidden 403, namespace-less resource"

[[tests.inputs]]
insert_at = "k8s_audit_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = '{"kind":"Event","apiVersion":"audit.k8s.io/v1","level":"Metadata","auditID":"xyz-forbidden-123","stage":"ResponseComplete","requestURI":"/apis/rbac.authorization.k8s.io/v1/clusterroles/view","verb":"delete","user":{"username":"system:serviceaccount:dev:builder"},"sourceIPs":["198.51.100.42"],"objectRef":{"resource":"clusterroles","name":"view","apiGroup":"rbac.authorization.k8s.io","apiVersion":"v1"},"responseStatus":{"code":403,"reason":"Forbidden"},"requestReceivedTimestamp":"2024-04-14T11:00:00Z","stageTimestamp":"2024-04-14T11:00:00.100Z","annotations":{"authorization.k8s.io/decision":"forbid"}}'

[[tests.outputs]]
extract_from = "k8s_audit_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 6003)
  assert_eq!(.activity_id, 4)
  assert_eq!(.status, "Failure")
  assert_eq!(.status_id, 2)
  assert_eq!(.severity_id, 3)
  assert_eq!(.api.operation, "delete")
  assert_eq!(.api.response.code, 403)
  assert_eq!(.api.response.message, "Forbidden")
  assert_eq!(.actor.user.name, "system:serviceaccount:dev:builder")
  assert_eq!(.actor.user.uid, null)
  assert_eq!(.http_request.user_agent, null)
  assert_eq!(.resources[0].type, "clusterroles")
  assert_eq!(.resources[0].group, "rbac.authorization.k8s.io")
  assert_eq!(.resources[0].namespace, null)
  assert_eq!(.unmapped.authorization_decision, "forbid")
  assert!(exists(.raw))
  assert!(exists(.uid))
'''
