[[tests]]
name = "k8s-audit — get pod allow (nominal)"

[[tests.inputs]]
insert_at = "k8s_audit_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = '{"kind":"Event","apiVersion":"audit.k8s.io/v1","level":"Metadata","auditID":"a1b2c3d4-e5f6-7890-abcd-ef1234567890","stage":"ResponseComplete","requestURI":"/api/v1/namespaces/default/pods/mypod","verb":"get","user":{"username":"kube-admin","uid":"u-1","groups":["system:masters"]},"sourceIPs":["10.0.0.5"],"userAgent":"kubectl/v1.28.0","objectRef":{"resource":"pods","namespace":"default","name":"mypod","apiVersion":"v1"},"responseStatus":{"code":200},"requestReceivedTimestamp":"2024-04-14T10:23:45.123456Z","stageTimestamp":"2024-04-14T10:23:45.234567Z","annotations":{"authorization.k8s.io/decision":"allow"}}'

[[tests.outputs]]
extract_from = "k8s_audit_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 6003)
  assert_eq!(.category_uid, 6)
  assert_eq!(.severity_id, 1)
  assert_eq!(.activity_id, 2)
  assert_eq!(.status, "Success")
  assert_eq!(.status_id, 1)
  assert_eq!(.api.operation, "get")
  assert_eq!(.api.request.uri, "/api/v1/namespaces/default/pods/mypod")
  assert_eq!(.api.request.uid, "a1b2c3d4-e5f6-7890-abcd-ef1234567890")
  assert_eq!(.api.response.code, 200)
  assert_eq!(.actor.user.name, "kube-admin")
  assert_eq!(.actor.user.uid, "u-1")
  assert_eq!(.src_endpoint.ip, "10.0.0.5")
  assert_eq!(.http_request.user_agent, "kubectl/v1.28.0")
  assert_eq!(.resources[0].type, "pods")
  assert_eq!(.resources[0].namespace, "default")
  assert_eq!(.resources[0].name, "mypod")
  assert_eq!(.unmapped.authorization_decision, "allow")
  assert_eq!(.metadata.product.name, "Kubernetes")
  assert!(exists(.raw))
  assert!(exists(.uid))
  assert!(exists(.time))
'''
