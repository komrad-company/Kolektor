[[tests]]
name = "CrowdStrike — DetectionSummaryEvent (mimikatz)"

[[tests.inputs]]
insert_at = "crowdstrike_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = '{"metadata":{"eventType":"DetectionSummaryEvent","eventCreationTime":1713091425000,"customerIDString":"abc123","eventId":"evt-001","severity":4},"SeverityName":"High","ComputerName":"WS01","UserName":"CORP\\jdoe","FileName":"mimikatz.exe","CommandLine":"mimikatz.exe privilege::debug sekurlsa::logonpasswords","SHA256String":"a1b2c3d4e5f6","DetectName":"Credential Theft","DetectDescription":"Mimikatz credential harvesting tool","DetectId":"det-001","Tactic":"Credential Access","Technique":"OS Credential Dumping","TechniqueId":"T1003","LocalIP":"10.0.0.50","ParentImageFileName":"cmd.exe","ParentCommandLine":"cmd.exe /c","FalconHostLink":"https://falcon.crowdstrike.com/detects/det-001"}'

[[tests.outputs]]
extract_from = "crowdstrike_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 2001)
  assert_eq!(.category_uid, 2)
  assert_eq!(.severity_id, 4)
  assert_eq!(.process.name, "mimikatz.exe")
  assert_eq!(.actor.user.name, "CORP\\jdoe")
  assert_eq!(.finding_info.title, "Credential Theft")
  assert_eq!(.finding_info.analytic.uid, "T1003")
  assert_eq!(.finding_info.analytic.name, "OS Credential Dumping")
  assert_eq!(.time, 1713091425000)
  assert_eq!(.src_endpoint.hostname, "WS01")
  assert_eq!(.unmapped.event_type, "DetectionSummaryEvent")
  assert_eq!(.metadata.product.vendor_name, "CrowdStrike")
'''
