[[tests]]
name = "CrowdStrike — ProcessRollup2 (powershell)"

[[tests.inputs]]
insert_at = "parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = '{"metadata":{"eventType":"ProcessRollup2","eventCreationTime":1713091500000,"customerIDString":"abc123","eventId":"evt-002"},"ComputerName":"WS01","UserName":"CORP\\jdoe","ImageFileName":"powershell.exe","CommandLine":"powershell.exe -enc SQBFAFgA","ProcessId":4567,"ParentImageFileName":"explorer.exe","ParentProcessId":1234,"SHA256String":"e5f6a1b2c3d4","LocalIP":"10.0.0.50","ProcessStartTime":1713091500000}'

[[tests.outputs]]
extract_from = "parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 1003)
  assert_eq!(.category_uid, 1)
  assert_eq!(.process.name, "powershell.exe")
  assert_eq!(.process.cmd_line, "powershell.exe -enc SQBFAFgA")
  assert_eq!(.process.pid, 4567)
  assert_eq!(.actor.process.name, "explorer.exe")
  assert_eq!(.unmapped.event_type, "ProcessRollup2")
'''
