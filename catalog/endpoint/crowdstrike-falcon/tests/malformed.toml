[[tests]]
name = "CrowdStrike — malformed JSON (no metadata)"

[[tests.inputs]]
insert_at = "crowdstrike_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = '{"random":"data","without":"metadata_field"}'

[[tests.outputs]]
extract_from = "crowdstrike_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 0)
'''

[[tests.outputs]]
extract_from = "crowdstrike_raw_failed"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.parse_status, "failed")
  assert_eq!(.source_type, "endpoint/crowdstrike-falcon")
  assert_eq!(.parse_error, "crowdstrike_metadata_missing")
  assert!(exists(.raw))
  assert!(exists(.uid))
'''

[[tests]]
name = "CrowdStrike — not JSON at all"

[[tests.inputs]]
insert_at = "crowdstrike_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = "this is not json at all"

[[tests.outputs]]
extract_from = "crowdstrike_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 0)
'''

[[tests.outputs]]
extract_from = "crowdstrike_raw_failed"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.parse_status, "failed")
  assert_eq!(.raw, "this is not json at all")
'''
