[[tests]]
name = "CrowdSec — ssh-bf ban decision (High)"

[[tests.inputs]]
insert_at = "crowdsec_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  scenario         = "crowdsecurity/ssh-bf"
  scenario_hash    = "9d2b6f1c3a4e5d6f7a8b9c0d1e2f3a4b"
  scenario_version = "0.1"
  message          = "Ip 1.2.3.4 performed 'crowdsecurity/ssh-bf' (6 events over 5s)"
  events_count     = 6
  remediation      = true
  start_at         = "2024-04-14T10:23:45Z"
  stop_at          = "2024-04-14T10:23:50Z"

  [tests.inputs.log_fields.source]
  scope    = "Ip"
  value    = "1.2.3.4"
  ip       = "1.2.3.4"
  cn       = "US"
  as_name  = "EXAMPLE-AS"
  latitude = 0.0

  [[tests.inputs.log_fields.decisions]]
  type     = "ban"
  scope    = "Ip"
  value    = "1.2.3.4"
  duration = "4h"
  origin   = "crowdsec"
  scenario = "crowdsecurity/ssh-bf"

[[tests.outputs]]
extract_from = "crowdsec_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 2001)
  assert_eq!(.category_uid, 2)
  assert_eq!(.activity_id, 1)
  assert_eq!(.severity_id, 4)
  assert_eq!(.time, 1713090225000)
  assert_eq!(.finding_info.title, "crowdsecurity/ssh-bf")
  assert_eq!(.finding_info.uid, "9d2b6f1c3a4e5d6f7a8b9c0d1e2f3a4b")
  assert_eq!(.src_endpoint.ip, "1.2.3.4")
  assert_eq!(.src_endpoint.location.country, "US")
  assert_eq!(.src_endpoint.location.isp, "EXAMPLE-AS")
  assert_eq!(.metadata.product.name, "CrowdSec")
  assert_eq!(.metadata.product.vendor_name, "CrowdSec")
  assert_eq!(.metadata.version, "0.1")
  assert_eq!(.unmapped.decision_type, "ban")
  assert_eq!(.unmapped.events_count, 6)
  assert!(exists(.raw))
  assert!(exists(.uid))
  assert!(exists(.received_time))
  assert!(exists(.tenant_id))
  assert!(exists(.datasource_id))
'''
