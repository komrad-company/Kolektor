[[tests]]
name = "syslog — malformed (severity string inconnue)"

[[tests.inputs]]
insert_at = "syslog_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message  = "some syslog payload"
  hostname = "host01"
  appname  = "unknown"
  severity = "not-a-valid-level"
  facility = "daemon"

# Severity inconnue → default info (sev=6) → ocsf_severity=1.
# Le transform ne doit pas panic.
[[tests.outputs]]
extract_from = "syslog_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 0)
  assert_eq!(.category_uid, 0)
  assert_eq!(.severity_id, 1)
  assert_eq!(.parse_status, "parsed")
  assert!(exists(.raw))
  assert!(exists(.uid))
'''
