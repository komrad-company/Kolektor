[[tests]]
name = "auditd — malformed (pas de header type=...)"

[[tests.inputs]]
insert_at = "auditd_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message  = "ligne non auditd sans type= ni msg=audit()"
  hostname = "host01"
  appname  = "auditd"

# Le transform ne doit pas panic : audit_type reste null, aucun pairs extrait.
# L'event passe le filter_valid (.raw non vide) mais avec des champs OCSF dégradés.
[[tests.outputs]]
extract_from = "auditd_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 0)
  assert_eq!(.unmapped.audit_type, null)
  assert_eq!(.unmapped.syscall, null)
  assert!(exists(.raw))
  assert!(exists(.uid))
'''

[[tests.outputs]]
extract_from = "auditd_raw_only"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.parse_status, "failed")
  assert_eq!(.source_type, "linux/auditd")
  assert_eq!(.parse_error, "auditd_type_unsupported")
  assert!(exists(.raw))
  assert!(exists(.uid))
'''
