[[tests]]
name = "auditd — malformed (no type= header)"

[[tests.inputs]]
insert_at = "auditd_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message  = "non-auditd line without type= or msg=audit()"
  hostname = "host01"
  appname  = "auditd"

# The transform must not panic: audit_type stays null, no pairs extracted.
# The event passes filter_valid (.raw non-empty) but with degraded OCSF fields.
[[tests.outputs]]
extract_from = "auditd_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 0)
  assert_eq!(.unmapped.audit_type, null)
  assert_eq!(.unmapped.syscall, null)
  assert!(exists(.raw))
  assert!(exists(.uid))
'''

[[tests.outputs]]
extract_from = "auditd_raw_only"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.parse_status, "failed")
  assert_eq!(.source_type, "linux/auditd")
  assert_eq!(.parse_error, "auditd_type_unsupported")
  assert!(exists(.raw))
  assert!(exists(.uid))
'''
