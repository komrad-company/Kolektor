[[tests]]
name = "nginx — 403 Forbidden (severity low)"

[[tests.inputs]]
insert_at = "nginx_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = '185.220.101.42 - - [14/Apr/2024:10:30:00 +0000] "POST /wp-login.php HTTP/1.1" 403 162 "-" "python-requests/2.28.1"'

[[tests.outputs]]
extract_from = "nginx_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 4002)
  assert_eq!(.severity_id, 2)
  assert_eq!(.http_response.code, 403)
  assert_eq!(.http_request.http_method, "POST")
  assert_eq!(.src_endpoint.ip, "185.220.101.42")
'''

[[tests]]
name = "nginx — 502 Bad Gateway (severity high)"

[[tests.inputs]]
insert_at = "nginx_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = '10.0.0.1 - admin [14/Apr/2024:11:00:00 +0000] "GET /health HTTP/1.1" 502 150 "-" "curl/7.88.1"'

[[tests.outputs]]
extract_from = "nginx_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.severity_id, 4)
  assert_eq!(.http_response.code, 502)
  assert_eq!(.actor.user.name, "admin")
'''
