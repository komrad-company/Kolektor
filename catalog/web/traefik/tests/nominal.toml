[[tests]]
name = "traefik — 200 OK GET request (nominal)"

[[tests.inputs]]
insert_at = "traefik_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = '{"ClientAddr":"10.0.0.5:54321","ClientHost":"10.0.0.5","ClientPort":"54321","ClientUsername":"-","DownstreamContentSize":1234,"DownstreamStatus":200,"Duration":12345678,"OriginContentSize":1234,"OriginStatus":200,"RequestAddr":"app.example.com","RequestContentSize":0,"RequestHost":"app.example.com","RequestMethod":"GET","RequestPath":"/api/v1/users","RequestPort":"443","RequestProtocol":"HTTP/2.0","RequestScheme":"https","RouterName":"websecure@docker","ServiceName":"api@docker","StartLocal":"2024-04-14T10:23:45.123456+02:00","StartUTC":"2024-04-14T08:23:45.123456Z","entryPointName":"websecure","level":"info","msg":"","request_User-Agent":"Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36","request_Referer":"https://app.example.com/dashboard","time":"2024-04-14T10:23:45+02:00"}'

[[tests.outputs]]
extract_from = "traefik_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 4002)
  assert_eq!(.category_uid, 4)
  assert_eq!(.severity_id, 1)
  assert_eq!(.activity_id, 3)
  assert_eq!(.http_request.http_method, "GET")
  assert_eq!(.http_request.url.path, "/api/v1/users")
  assert_eq!(.http_request.url.hostname, "app.example.com")
  assert_eq!(.http_request.url.scheme, "https")
  assert_eq!(.http_request.version, "HTTP/2.0")
  assert_eq!(.http_request.user_agent, "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36")
  assert_eq!(.http_request.referrer, "https://app.example.com/dashboard")
  assert_eq!(.http_response.code, 200)
  assert_eq!(.src_endpoint.ip, "10.0.0.5")
  assert_eq!(.traffic.bytes_out, 1234)
  assert_eq!(.traffic.bytes_in, 0)
  assert_eq!(.unmapped.router_name, "websecure@docker")
  assert_eq!(.unmapped.service_name, "api@docker")
  assert_eq!(.metadata.product.name, "Traefik")
  assert!(exists(.raw))
  assert!(exists(.time))
  assert!(exists(.tenant_id))
'''
