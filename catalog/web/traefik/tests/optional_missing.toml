[[tests]]
name = "traefik — 500 error, user-agent/referer absents"

[[tests.inputs]]
insert_at = "traefik_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = '{"ClientHost":"10.0.0.7","ClientUsername":"-","DownstreamContentSize":87,"DownstreamStatus":500,"Duration":98765,"RequestContentSize":0,"RequestHost":"api.example.com","RequestMethod":"POST","RequestPath":"/v1/submit","RequestProtocol":"HTTP/1.1","RequestScheme":"https","RouterName":"websecure@kubernetescrd","ServiceName":"api-svc@kubernetescrd","StartUTC":"2024-04-14T08:25:00Z","level":"info"}'

[[tests.outputs]]
extract_from = "traefik_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 4002)
  assert_eq!(.severity_id, 4)
  assert_eq!(.http_request.http_method, "POST")
  assert_eq!(.http_request.url.path, "/v1/submit")
  assert_eq!(.http_response.code, 500)
  assert_eq!(.src_endpoint.ip, "10.0.0.7")
  assert_eq!(.http_request.user_agent, null)
  assert_eq!(.http_request.referrer, null)
  assert_eq!(.actor.user.name, null)
  assert_eq!(.traffic.bytes_out, 87)
  assert!(exists(.raw))
'''
