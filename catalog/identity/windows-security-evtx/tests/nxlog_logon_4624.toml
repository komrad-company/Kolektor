[[tests]]
name = "Windows Security — 4624 via NXLog (top-level fields, no winlog envelope)"

[[tests.inputs]]
insert_at = "winevtx_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message       = ""
  timestamp     = "2024-04-14T10:23:45.000Z"
  event_id      = 4624
  computer_name = "DC01.corp.local"

    [tests.inputs.log_fields.event_data]
    TargetUserName    = "jdoe"
    TargetDomainName  = "CORP"
    TargetUserSid     = "S-1-5-21-123456-7890-1234567890-1001"
    SubjectUserName   = "SYSTEM"
    SubjectDomainName = "NT AUTHORITY"
    LogonType         = "3"
    IpAddress         = "10.0.0.51"
    IpPort            = "50211"
    LogonProcessName  = "NtLmSsp"

[[tests.outputs]]
extract_from = "winevtx_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 3002)
  assert_eq!(.user.name, "jdoe")
  assert_eq!(.src_endpoint.hostname, "DC01.corp.local")
  assert_eq!(.unmapped.event_id, 4624)
  assert_eq!(.logon_type_id, 3)
'''
