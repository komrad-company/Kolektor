[[tests]]
name = "Windows Security — 4625 Failed Logon"

[[tests.inputs]]
insert_at = "winevtx_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message   = ""
  timestamp = "2024-04-14T10:24:01.000Z"

  [tests.inputs.log_fields.winlog]
  event_id      = 4625
  computer_name = "DC01.corp.local"

    [tests.inputs.log_fields.winlog.event_data]
    TargetUserName    = "admin"
    TargetDomainName  = "CORP"
    SubjectUserName   = "-"
    SubjectDomainName = "-"
    LogonType         = "3"
    IpAddress         = "185.220.101.42"
    IpPort            = "44820"
    FailureReason     = "%%2313"
    SubStatus         = "0xC000006A"

[[tests.outputs]]
extract_from = "winevtx_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 3002)
  assert_eq!(.severity_id, 3)
  assert_eq!(.status, "Failure")
  assert_eq!(.status_id, 2)
  assert_eq!(.user.name, "admin")
  assert_eq!(.src_endpoint.ip, "185.220.101.42")
  assert_eq!(.unmapped.event_id, 4625)
  assert_eq!(.unmapped.failure_reason, "%%2313")
'''
