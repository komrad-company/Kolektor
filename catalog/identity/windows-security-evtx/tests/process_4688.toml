[[tests]]
name = "Windows Security — 4688 New Process Created"

[[tests.inputs]]
insert_at = "parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message   = ""
  timestamp = "2024-04-14T11:00:00.000Z"

  [tests.inputs.log_fields.winlog]
  event_id      = 4688
  computer_name = "WS01.corp.local"

    [tests.inputs.log_fields.winlog.event_data]
    SubjectUserName   = "jdoe"
    SubjectDomainName = "CORP"
    NewProcessName    = "C:\\Windows\\System32\\cmd.exe"
    ParentProcessName = "C:\\Windows\\explorer.exe"
    CommandLine       = "cmd.exe /c whoami"

[[tests.outputs]]
extract_from = "parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 1003)
  assert_eq!(.category_uid, 1)
  assert_eq!(.severity_id, 1)
  assert_eq!(.unmapped.event_id, 4688)
  assert_eq!(.unmapped.process_name, "C:\\Windows\\System32\\cmd.exe")
  assert_eq!(.unmapped.command_line, "cmd.exe /c whoami")
  assert_eq!(.actor.user.name, "jdoe")
'''

[[tests]]
name = "Windows Security — unknown event ID (should be dropped)"

[[tests.inputs]]
insert_at = "parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message   = ""
  timestamp = "2024-04-14T12:00:00.000Z"

  [tests.inputs.log_fields.winlog]
  event_id      = 0
  computer_name = "DC01"

# Verify the VRL sets event_id=0, which causes filter_valid to drop the event.
# Vector tests cannot assert "no events received", so we check the pre-filter output.
[[tests.outputs]]
extract_from = "parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.unmapped.event_id, 0)
'''
