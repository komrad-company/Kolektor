[[tests]]
name = "Windows Security — 4624 Successful Logon (interactive)"

[[tests.inputs]]
insert_at = "parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = ""

  [tests.inputs.log_fields.winlog]
  event_id      = 4624
  computer_name = "DC01.corp.local"

    [tests.inputs.log_fields.winlog.event_data]
    TargetUserName    = "jdoe"
    TargetDomainName  = "CORP"
    TargetUserSid     = "S-1-5-21-123456-7890-1234567890-1001"
    SubjectUserName   = "SYSTEM"
    SubjectDomainName = "NT AUTHORITY"
    LogonType         = "2"
    IpAddress         = "10.0.0.50"
    IpPort            = "49152"
    LogonProcessName  = "User32"

  [tests.inputs.log_fields]
  "@timestamp" = "2024-04-14T10:23:45.000Z"

[[tests.outputs]]
extract_from = "parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 3002)
  assert_eq!(.category_uid, 3)
  assert_eq!(.severity_id, 1)
  assert_eq!(.status, "Success")
  assert_eq!(.user.name, "jdoe")
  assert_eq!(.user.domain, "CORP")
  assert_eq!(.src_endpoint.ip, "10.0.0.50")
  assert_eq!(.unmapped.event_id, 4624)
  assert_eq!(.unmapped.logon_type, 2)
'''
