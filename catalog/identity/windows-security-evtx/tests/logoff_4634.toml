[[tests]]
name = "Windows Security — 4634 Logoff"

[[tests.inputs]]
insert_at = "winevtx_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message   = ""
  timestamp = "2024-04-14T10:31:12.000Z"

  [tests.inputs.log_fields.winlog]
  event_id      = 4634
  computer_name = "DC01.corp.local"

    [tests.inputs.log_fields.winlog.event_data]
    TargetUserName   = "jdoe"
    TargetDomainName = "CORP"
    TargetUserSid    = "S-1-5-21-123456-7890-1234567890-1001"
    LogonType        = "2"

[[tests.outputs]]
extract_from = "winevtx_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 3002)
  assert_eq!(.category_uid, 3)
  assert_eq!(.activity_id, 2)
  assert_eq!(.severity_id, 1)
  assert_eq!(.status, "Other")
  assert_eq!(.status_id, 99)
  assert_eq!(.user.name, "jdoe")
  assert_eq!(.unmapped.event_id, 4634)
'''
