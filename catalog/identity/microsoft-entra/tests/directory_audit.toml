[[tests]]
name = "Microsoft Entra — directory audit"

[[tests.inputs]]
insert_at = "microsoft_entra_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  id                  = "audit-1"
  activityDateTime    = "2026-04-22T10:10:00Z"
  activityDisplayName = "Add member to group"
  category            = "GroupManagement"
  result              = "success"
  loggedByService     = "Core Directory"
  correlationId       = "corr-1"
  targetResources     = [{id = "group-1", displayName = "SOC Admins", type = "Group"}]

  [tests.inputs.log_fields.initiatedBy.user]
  id                = "admin-1"
  userPrincipalName = "admin@example.com"

  [tests.inputs.log_fields.initiatedBy.app]
  appId       = "app-admin"
  displayName = "Admin portal"

[[tests.outputs]]
extract_from = "microsoft_entra_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 6003)
  assert_eq!(.category_uid, 6)
  assert_eq!(.activity_id, 1)
  assert_eq!(.severity_id, 1)
  assert_eq!(.api.operation, "Add member to group")
  assert_eq!(.api.service.name, "GroupManagement")
  assert_eq!(.actor.user.name, "admin@example.com")
  assert_eq!(.actor.app.name, "Admin portal")
  assert_eq!(.unmapped.event_family, "directoryAudit")
  assert_eq!(.unmapped.target_resources[0].displayName, "SOC Admins")
'''
