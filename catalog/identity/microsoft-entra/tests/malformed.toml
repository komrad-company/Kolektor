[[tests]]
name = "Microsoft Entra — event type not recognized"

[[tests.inputs]]
insert_at = "microsoft_entra_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  id       = "entra-bad"
  category = "Unknown"

[[tests.outputs]]
extract_from = "microsoft_entra_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 0)
  assert_eq!(.category_uid, 0)
  assert!(exists(.raw))
'''

[[tests.outputs]]
extract_from = "microsoft_entra_raw_failed"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.parse_status, "failed")
  assert_eq!(.source_type, "identity/microsoft-entra")
  assert_eq!(.parse_error, "microsoft_entra_event_shape_invalid")
  assert!(exists(.raw))
'''
