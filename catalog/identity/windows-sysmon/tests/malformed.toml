[[tests]]
name = "Sysmon — malformed (winlog absent)"

[[tests.inputs]]
insert_at = "sysmon_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message   = "pas du Winlogbeat"
  timestamp = "2024-04-14T10:23:45.000Z"

# Sans .winlog.event_id, .unmapped.event_id == 0 → filter_valid drop
[[tests.outputs]]
extract_from = "sysmon_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.unmapped.event_id, 0)
  assert_eq!(.class_uid, 0)
'''

[[tests.outputs]]
extract_from = "sysmon_raw_failed"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.parse_status, "failed")
  assert_eq!(.source_type, "identity/windows-sysmon")
  assert_eq!(.parse_error, "sysmon_event_id_unsupported")
  assert!(exists(.raw))
  assert!(exists(.uid))
'''
