[[tests]]
name = "Sysmon — Event 1 Process Create (nominal, winlogbeat envelope)"

[[tests.inputs]]
insert_at = "sysmon_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = ""
  "@timestamp" = "2024-04-14T10:23:46.000Z"
  timestamp = "2024-04-14T10:25:00.000Z"

  [tests.inputs.log_fields.agent]
  type    = "winlogbeat"
  version = "8.13.0"

  [tests.inputs.log_fields.host]
  name = "WS01"

  [tests.inputs.log_fields.ecs]
  version = "8.0.0"

  [tests.inputs.log_fields.winlog]
  event_id      = 1
  computer_name = "WS01.corp.local"

    [tests.inputs.log_fields.winlog.event_data]
    UtcTime             = "2024-04-14 10:23:45.123"
    User                = "CORP\\jdoe"
    ProcessId           = "4567"
    Image               = "C:\\Windows\\System32\\WindowsPowerShell\\v1.0\\powershell.exe"
    CommandLine         = "powershell.exe -enc SQBFAFgA"
    ParentProcessId     = "1234"
    ParentImage         = "C:\\Windows\\explorer.exe"
    ParentCommandLine   = "explorer.exe"
    Hashes              = "SHA256=A1B2C3D4E5F6A1B2C3D4E5F6A1B2C3D4E5F6A1B2C3D4E5F6A1B2C3D4E5F6A1B2,MD5=0123456789ABCDEF0123456789ABCDEF"
    ProcessGuid         = "{12345678-abcd-ef01-2345-6789abcdef01}"
    RuleName            = "technique_id=T1059"

[[tests.outputs]]
extract_from = "sysmon_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 1007)
  assert_eq!(.category_uid, 1)
  assert_eq!(.activity_id, 1)
  assert_eq!(.severity_id, 1)
  # Event time from Sysmon UtcTime (2024-04-14 10:23:45.123 UTC), not ingest.
  assert_eq!(.time, 1713090225123)
  assert_eq!(.process.name, "C:\\Windows\\System32\\WindowsPowerShell\\v1.0\\powershell.exe")
  assert_eq!(.process.cmd_line, "powershell.exe -enc SQBFAFgA")
  assert_eq!(.process.pid, 4567)
  # Hashes is "SHA256=...,MD5=..." — only the SHA256 hex value is stored.
  assert_eq!(.process.file.hashes[0].algorithm, "SHA256")
  assert_eq!(.process.file.hashes[0].value, "A1B2C3D4E5F6A1B2C3D4E5F6A1B2C3D4E5F6A1B2C3D4E5F6A1B2C3D4E5F6A1B2")
  assert_eq!(.actor.user.name, "CORP\\jdoe")
  assert_eq!(.actor.process.name, "C:\\Windows\\explorer.exe")
  assert_eq!(.unmapped.event_id, 1)
  # Winlogbeat envelope is rebuilt away — none of it leaks.
  assert!(!exists(.agent))
  assert!(!exists(.host))
  assert!(!exists(.ecs))
  assert!(!exists(."@timestamp"))
  assert!(!exists(.winlog))
  assert!(!exists(.message))
  # DNS/network substructures must not be attached to a process event.
  assert!(!exists(.query))
  assert!(!exists(.src_endpoint))
  assert!(!exists(.module))
'''
