[[tests]]
name = "Sysmon — Event 3 Network Connection"

[[tests.inputs]]
insert_at = "sysmon_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = ""
  "@timestamp" = "2024-04-14T10:30:00.000Z"

  [tests.inputs.log_fields.agent]
  type = "winlogbeat"

  [tests.inputs.log_fields.winlog]
  event_id      = 3
  computer_name = "WS01.corp.local"

    [tests.inputs.log_fields.winlog.event_data]
    UtcTime             = "2024-04-14 10:30:00.000"
    User                = "CORP\\jdoe"
    ProcessId           = "4567"
    Image               = "C:\\Windows\\System32\\WindowsPowerShell\\v1.0\\powershell.exe"
    SourceIp            = "10.0.0.50"
    SourcePort          = "49152"
    DestinationIp       = "185.199.108.133"
    DestinationPort     = "443"
    DestinationHostname = "github.com"

[[tests.outputs]]
extract_from = "sysmon_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 4001)
  assert_eq!(.category_uid, 4)
  assert_eq!(.activity_id, 6)
  assert_eq!(.src_endpoint.ip, "10.0.0.50")
  assert_eq!(.src_endpoint.port, 49152)
  assert_eq!(.src_endpoint.hostname, "WS01.corp.local")
  assert_eq!(.dst_endpoint.ip, "185.199.108.133")
  assert_eq!(.dst_endpoint.port, 443)
  assert_eq!(.dst_endpoint.hostname, "github.com")
  assert_eq!(.unmapped.event_id, 3)
  # Process/dns substructures must not be attached to a network event.
  assert!(!exists(.process))
  assert!(!exists(.actor))
  assert!(!exists(.query))
'''

[[tests]]
name = "Sysmon — Event 3 Network Connection (optional DestinationHostname missing)"

[[tests.inputs]]
insert_at = "sysmon_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = ""
  "@timestamp" = "2024-04-14T10:31:00.000Z"

  [tests.inputs.log_fields.winlog]
  event_id      = 3
  computer_name = "WS01.corp.local"

    [tests.inputs.log_fields.winlog.event_data]
    UtcTime         = "2024-04-14 10:31:00.000"
    ProcessId       = "4567"
    Image           = "C:\\Windows\\System32\\svchost.exe"
    SourceIp        = "10.0.0.50"
    SourcePort      = "51000"
    DestinationIp   = "93.184.216.34"
    DestinationPort = "80"

[[tests.outputs]]
extract_from = "sysmon_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 4001)
  assert_eq!(.dst_endpoint.ip, "93.184.216.34")
  # Optional DestinationHostname absent → empty string (to_string(null)=""),
  # event still classified, not dropped, not crashing.
  assert_eq!(.dst_endpoint.hostname, "")
'''
