[[tests]]
name = "Sysmon — Event 22 DNS Query"

[[tests.inputs]]
insert_at = "sysmon_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = ""
  "@timestamp" = "2024-04-14T10:35:00.000Z"

  [tests.inputs.log_fields.agent]
  type = "winlogbeat"

  [tests.inputs.log_fields.winlog]
  event_id      = 22
  computer_name = "WS01.corp.local"

    [tests.inputs.log_fields.winlog.event_data]
    UtcTime      = "2024-04-14 10:35:00.000"
    User         = "CORP\\jdoe"
    ProcessId    = "4567"
    Image        = "C:\\Program Files\\Mozilla Firefox\\firefox.exe"
    QueryName    = "malware-c2.evil.com"
    QueryResults = "type:  5 c2-server.evil.com;::ffff:93.184.216.34;"

[[tests.outputs]]
extract_from = "sysmon_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 4003)
  assert_eq!(.category_uid, 4)
  assert_eq!(.activity_id, 1)
  assert_eq!(.query.hostname, "malware-c2.evil.com")
  assert_eq!(.query.type, "5")
  assert_eq!(.unmapped.query_results, "type:  5 c2-server.evil.com;::ffff:93.184.216.34;")
  assert_eq!(.unmapped.event_id, 22)
  # Process/network substructures must not be attached to a DNS event.
  assert!(!exists(.process))
  assert!(!exists(.actor))
  assert!(!exists(.src_endpoint))
  assert!(!exists(.dst_endpoint))
  assert!(!exists(.file))
'''

[[tests]]
name = "Sysmon — Event 22 DNS Query (optional QueryResults missing)"

[[tests.inputs]]
insert_at = "sysmon_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  message = ""
  "@timestamp" = "2024-04-14T10:36:00.000Z"

  [tests.inputs.log_fields.winlog]
  event_id      = 22
  computer_name = "WS01.corp.local"

    [tests.inputs.log_fields.winlog.event_data]
    UtcTime   = "2024-04-14 10:36:00.000"
    ProcessId = "4567"
    Image     = "C:\\Program Files\\Mozilla Firefox\\firefox.exe"
    QueryName = "example.com"

[[tests.outputs]]
extract_from = "sysmon_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 4003)
  assert_eq!(.query.hostname, "example.com")
  # QueryResults absent → no type regex match, query.type stays null.
  assert_eq!(.query.type, null)
  # to_string(null) is "", so the unmapped passthrough is the empty string.
  assert_eq!(.unmapped.query_results, "")
'''
