[[tests]]
name = "Okta — successful session start (Authentication 3002)"

[[tests.inputs]]
insert_at = "okta_parse_and_normalize"
type      = "log"

  [tests.inputs.log_fields]
  uuid           = "e1a2b3c4-0000-1111-2222-333344445555"
  published      = "2024-04-14T10:23:45.123Z"
  eventType      = "user.session.start"
  severity       = "INFO"
  displayMessage = "User login to Okta"

  [tests.inputs.log_fields.actor]
  id          = "00u1abc"
  type        = "User"
  alternateId = "jdoe@corp.com"
  displayName = "J Doe"

  [tests.inputs.log_fields.client]
  ipAddress = "1.2.3.4"

  [tests.inputs.log_fields.client.userAgent]
  rawUserAgent = "Mozilla/5.0"

  [tests.inputs.log_fields.client.geographicalContext]
  country = "US"
  city    = "NYC"

  [tests.inputs.log_fields.outcome]
  result = "SUCCESS"

[[tests.outputs]]
extract_from = "okta_parse_and_normalize"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 3002)
  assert_eq!(.category_uid, 3)
  assert_eq!(.activity_id, 1)
  assert_eq!(.severity_id, 1)
  assert_eq!(.status, "Success")
  assert_eq!(.status_id, 1)
  assert_eq!(.time, 1713090225123)
  assert_eq!(.actor.user.name, "jdoe@corp.com")
  assert_eq!(.actor.user.full_name, "J Doe")
  assert_eq!(.actor.user.uid, "00u1abc")
  assert_eq!(.src_endpoint.ip, "1.2.3.4")
  assert_eq!(.metadata.uid, "e1a2b3c4-0000-1111-2222-333344445555")
  assert_eq!(.metadata.product.name, "Okta")
  assert_eq!(.metadata.product.vendor_name, "Okta")
  assert_eq!(.unmapped.event_type, "user.session.start")
  assert!(exists(.raw))
'''

[[tests.outputs]]
extract_from = "okta_route_by_class.identity"

[[tests.outputs.conditions]]
type   = "vrl"
source = '''
  assert_eq!(.class_uid, 3002)
'''
