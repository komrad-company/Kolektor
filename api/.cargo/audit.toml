[advisories]
# cargo-audit attend une liste de strings (pas d'inline tables, syntaxe differente de cargo-deny).
ignore = [
    # sqlx-mysql est une dep transitive de sqlx (toujours incluse dans le lockfile
    # meme sans la feature mysql). Kolektor n'utilise pas MySQL -- aucune operation
    # RSA n'est exposee. Aucune version corrigee disponible upstream.
    "RUSTSEC-2023-0071",
    # rand 0.8.5 transitive via sqlx-postgres 0.8.6 ; sqlx 0.9 pas encore stable.
    # La faille necessite un global allocator custom + panic handler custom -- non applicable.
    "RUSTSEC-2024-0375",
]
