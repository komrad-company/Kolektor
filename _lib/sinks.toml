# ==============================================================================
# Sinks Quickwit reutilisables
# Importer via: vector --config _lib/sinks.toml --config catalog/.../vector.toml
# ==============================================================================

# Sink pour OCSF Network Activity (4001)
[sinks.quickwit_network]
type                = "http"
inputs              = ["filter_valid"]
uri                 = "${QUICKWIT_ENDPOINT}/api/v1/ocsf-network/ingest"
encoding.codec      = "json"
framing.method      = "newline_delimited"
batch.max_events    = 1000
batch.timeout_secs  = 5

[sinks.quickwit_network.request]
headers.Content-Type = "application/x-ndjson"

