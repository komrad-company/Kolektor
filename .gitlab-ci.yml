stages:
  - validate
  - test
  - report
  - build

variables:
  VECTOR_IMAGE: timberio/vector:0.54.0-debian
  REGISTRY: $CI_REGISTRY
  IMAGE_NAME: $CI_REGISTRY_IMAGE

validate:
  stage: validate
  image: $VECTOR_IMAGE
  script:
    - chmod +x ci/validate.sh
    - ci/validate.sh
  artifacts:
    reports:
      junit: ci/results/validate-junit.xml
    paths:
      - ci/results/
    when: always

test:
  stage: test
  image: $VECTOR_IMAGE
  script:
    - chmod +x ci/test.sh
    - ci/test.sh
  artifacts:
    reports:
      junit: ci/results/test-junit.xml
    paths:
      - ci/results/
    when: always

report:
  stage: report
  image: python:3.12-slim
  needs:
    - job: validate
      artifacts: true
    - job: test
      artifacts: true
  script:
    - python ci/report.py
  artifacts:
    paths:
      - ci/results/report.md
  when: always

coverage:
  stage: report
  image: $VECTOR_IMAGE
  script:
    - chmod +x ci/coverage.sh
    - ci/coverage.sh
  allow_failure: false

build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64)\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
      --destination "${IMAGE_NAME}:latest"
      --skip-tls-verify
  only:
    - main
