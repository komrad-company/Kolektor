# ==============================================================================
# <Source Name> — <Log Type>
# OCSF Class : <class_uid> (<Class Name>)
# Input      : <syslog/file/http>
# Tested with: <Product Version>
# ==============================================================================

# --- SOURCE ---
# Adapter le type de source selon le cas d'usage
[sources.input]
type    = "syslog"
address = "0.0.0.0:${LISTEN_PORT:-514}"
mode    = "tcp"

# --- TRANSFORM : parse + normalisation OCSF ---
[transforms.parse_and_normalize]
type   = "remap"
inputs = ["input"]
source = '''
  raw_msg = string!(.message)

  # Champs injectes par l'orchestrateur au runtime
  .tenant_id     = "${TENANT_ID}"
  .datasource_id = "${DATASOURCE_ID}"
  .received_time = to_unix_timestamp(now(), unit: "milliseconds")

  # --- Parsing du log brut ---
  # TODO: parser le message selon le format de la source
  valid = true

  # --- Normalisation OCSF ---
  if valid {
    .class_uid    = 0       # TODO: classe OCSF
    .category_uid = 0       # TODO: categorie OCSF
    .severity_id  = 1       # 0=Unknown, 1=Info, 2=Low, 3=Medium, 4=High, 5=Critical
  } else {
    .class_uid    = 0
    .category_uid = 0
    .severity_id  = 0
  }
  .time = to_unix_timestamp(now(), unit: "milliseconds")

  .metadata = {
    "product": {
      "name":        "TODO",
      "vendor_name": "TODO"
    },
    "version": "1.0.0"
  }

  # Conserver le message original
  .raw = raw_msg
  .uid = uuid_v4()
  del(.message)
'''

# --- FILTER : evenements OCSF valides ---
[transforms.filter_valid]
type      = "filter"
inputs    = ["parse_and_normalize"]
condition = 'exists(.class_uid) && .class_uid != 0'

[transforms.filter_failed]
type      = "filter"
inputs    = ["parse_and_normalize"]
condition = '!exists(.class_uid) || .class_uid == 0'

[transforms.raw_failed]
type   = "remap"
inputs = ["filter_failed"]
source = '''
  . = {
    "uid":           .uid,
    "time":          .time,
    "received_time": .received_time,
    "tenant_id":     .tenant_id,
    "datasource_id": .datasource_id,
    "source_type":   "<category>/<source>",
    "parser":        "<source>",
    "parse_status":  "failed",
    "parse_error":   "TODO",
    "raw":           .raw
  }
'''

# --- SINK : Quickwit OCSF ---
[sinks.quickwit]
type                = "http"
inputs              = ["filter_valid"]
uri                 = "${QUICKWIT_ENDPOINT}/api/v1/ocsf-network/ingest"
encoding.codec      = "json"
framing.method      = "newline_delimited"
batch.max_events    = 1000
batch.timeout_secs  = 5

[sinks.quickwit.request]
headers.Content-Type = "application/x-ndjson"

# --- SINK : Quickwit raw-logs (echecs de parsing uniquement) ---
[sinks.quickwit_raw_failed]
type                = "http"
inputs              = ["raw_failed"]
uri                 = "${QUICKWIT_ENDPOINT}/api/v1/raw-logs/ingest"
encoding.codec      = "json"
framing.method      = "newline_delimited"
batch.max_events    = 1000
batch.timeout_secs  = 5

[sinks.quickwit_raw_failed.request]
headers.Content-Type = "application/x-ndjson"
